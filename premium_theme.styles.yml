  preview_libraries:
    - styles/styles.preview
    - premium_theme/column-spacing-bottom
  preview_style: icon
  styles:
    spacing-bottom-none: None
    spacing-bottom-small: Small
    spacing-bottom-medium: Medium
    spacing-bottom-large: Large

column_width:
  label: Column width
  preview_libraries:
    - styles/styles.preview
    - premium_theme/column-width
  preview_style: icon
  styles:
    width-narrow: Narrow
    width-normal: Normal
    width-full: Full width
