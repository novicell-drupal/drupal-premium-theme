name: Premium theme
type: theme
description: 'Premium theme'
package: Drupal Premium
version: 2.0.0
core_version_requirement: ^8.8 || ^9 || ^10
base theme: false

libraries:
  - premium_theme/lazyload

libraries-override:
  claro/claro.drupal.dialog: false

  core/drupal.dialog.off_canvas:
    css:
      base:
        misc/dialog/off-canvas/css/reset.css: false

libraries-extend:
  gin/gin_base:
    - premium_theme/custom-gin
